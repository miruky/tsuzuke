<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="習慣トラッカー。続いた日が直近1年のSVGヒートマップになる。データは端末の中だけに置く。"
    />
    <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16140f" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="preconnect" href="https://fastly.picsum.photos" crossorigin />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <title>tsuzuke — 習慣トラッカー</title>
    <script>
      // 描画前に保存済みテーマを反映してちらつきを防ぐ。auto時は属性を付けない。
      (function () {
        try {
          var p = localStorage.getItem('tsuzuke:theme');
          if (p === 'light' || p === 'dark') {
            document.documentElement.setAttribute('data-theme', p);
          }
        } catch (e) {
          /* localStorageが使えなくても致命的でない */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
